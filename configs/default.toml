random_seed = 42

[dataset]
name = "imagenet"
seed_size = 200
batch_size = 32

[models]
names = ["resnet50", "vgg16_bn", "mobilenet_v2"]
target_idx = 0

[neurons]
enabled = true
activation_threshold = 0.5
critical_threshold = 0.9

[fuzz]
max_iterations = 100
step_size = 0.01
pgd_steps = 10
batch_size = 8
lambda1 = 1.0
lambda2 = 0.5
epsilon = 0.03
log_interval = 20

[device]
name = "cuda"
